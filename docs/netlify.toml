# Netlify deploy config for the docs site.
# Set the site's "Base directory" to `docs` in the Netlify UI (or `base` here
# is relative to the repo root). Netlify installs the pnpm workspace, then
# builds this package. DOCS_BASE=/ serves from the domain root.
[build]
  base = "docs"
  command = "DOCS_BASE=/ vitepress build"
  publish = ".vitepress/dist"

[build.environment]
  NODE_VERSION = "20"
  # Canonical URL for sitemap + og:url. Replace with this deploy's domain —
  # the build fails if left unset while DOCS_BASE is overridden.
  DOCS_HOSTNAME = "https://kickjs.example/"
