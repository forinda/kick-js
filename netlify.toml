# Netlify config for the docs site (repo-root file so it's read regardless of
# UI settings). `base = "docs"` builds the docs workspace package; the command
# runs through pnpm so the workspace-local `vitepress` bin resolves.
#
# The config defaults (base "/", hostname kickjs.app) are correct for this
# deploy, so no DOCS_BASE/DOCS_HOSTNAME env is needed. In the Netlify UI, leave
# "Base directory", "Build command" and "Publish directory" blank so this file
# is authoritative.
[build]
  base = "docs"
  command = "pnpm build"
  publish = ".vitepress/dist"

[build.environment]
  NODE_VERSION = "20"
