<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Square branded marketplace icon — PNG built from this source via scripts/build-icons.mjs.
       Background gradient gives it presence on both light + dark gallery backgrounds; the
       lightning bolt is the same shape as resources/icon.svg, scaled to fit with breathing room. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bolt" x1="40" y1="20" x2="88" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>
  <polygon
    points="74 14 22 76 60 76 54 114 106 52 68 52 74 14"
    fill="url(#bolt)"
    stroke="#bae6fd"
    stroke-width="2"
    stroke-linejoin="round"
  />
</svg>
