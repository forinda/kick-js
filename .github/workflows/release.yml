name: Release

on:
  push:
    branches:
      - main
  # Manual escape hatch — re-run after fixing local npm / tag state
  # if a publish step failed mid-flight. The changesets action is
  # idempotent: packages already at the target version skip cleanly.
  workflow_dispatch:

# Concurrency: only one release flow at a time per branch.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version Packages or Publish
    runs-on: ubuntu-latest
    # The changesets action opens / updates a "Version Packages" PR
    # whenever pending changesets exist on main, OR publishes when
    # those version bumps land back on main. Both flows need write
    # access to the repo. `id-token: write` is required for npm
    # trusted-publisher OIDC — npm verifies the workflow's identity
    # against the trusted-publisher rule registered per package, so
    # no NPM_TOKEN secret is in play.
    # https://docs.npmjs.com/trusted-publishers/
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so the changesets action can compute the
          # changelog diff against previous tags.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 24 ships npm ≥ 11.5.1 which is required for npm
          # trusted publishers. If we ever need to drop to Node 20
          # for publish, install npm@latest as a separate step.
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # When pending changesets exist, this opens / updates a
          # "Version Packages" PR that bumps the affected packages
          # + writes per-package CHANGELOG.md entries. Merging that
          # PR triggers another run of this workflow with no pending
          # changesets — the action then runs `publish:` instead.
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: npm trusted-publisher OIDC handles auth.
          # `NPM_CONFIG_PROVENANCE=true` makes every published tarball
          # carry a signed provenance statement linking the artefact
          # to this exact workflow run + commit. Required for the
          # "Verified" badge on npm.
          NPM_CONFIG_PROVENANCE: 'true'
