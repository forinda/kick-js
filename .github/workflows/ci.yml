name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest]
        # os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Build framework packages
        run: pnpm build

      - name: Typecheck
        run: pnpm -r --filter='./packages/*' typecheck

      - name: Run tests
        run: pnpm test

      - name: Format check
        run: pnpm format:check

  bun-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: pnpm build

      - name: Smoke test — imports resolve under Bun
        run: |
          bun -e "
            import { Container, Service, Controller } from './packages/kickjs/dist/index.mjs'
            import { Application, RequestContext, buildRoutes } from './packages/kickjs/dist/index.mjs'
            console.log('Container:', typeof Container)
            console.log('Application:', typeof Application)
            console.log('Bun smoke test passed')
          "

      - name: Smoke test — bun test on core exports
        run: |
          bun -e "
            import { Container, Scope, Service, Controller, Get, Inject } from './packages/kickjs/dist/index.mjs'
            import { RequestContext, buildRoutes, bootstrap } from './packages/kickjs/dist/index.mjs'
            const checks = { Container, Scope, Service, Controller, Get, Inject, RequestContext, buildRoutes, bootstrap }
            for (const [name, val] of Object.entries(checks)) {
              if (!val) { console.error('Missing export:', name); process.exit(1) }
            }
            console.log('All', Object.keys(checks).length, 'exports verified')
            console.log('Bun export test passed')
          "

  deno-smoke-test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Smoke test — pure ESM imports resolve under Deno
        run: |
          cat > deno-smoke.mjs << 'EOF'
          import { Scope, Container, parseQuery } from "./packages/kickjs/dist/index.mjs"
          console.log("Scope:", typeof Scope)
          console.log("Container:", typeof Container)
          console.log("parseQuery:", typeof parseQuery)
          console.log("Deno smoke test passed")
          EOF
          deno run --allow-read=. --allow-env --allow-sys deno-smoke.mjs
          rm deno-smoke.mjs
