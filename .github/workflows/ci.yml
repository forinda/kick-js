name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# CI is split into independent parallel jobs instead of one sequential
# `lint-build-test` chain. Format/lint run in seconds and gate
# nothing else; typecheck, test, and build run in parallel and only
# the smoke tests (which need built artifacts) wait on `build`.
#
# Pre-commit (lefthook.yml) is intentionally a thin wrapper around
# `oxfmt --check` + `oxlint` + `kick-lint`. CI is the canonical
# verification.

jobs:
  format:
    name: Format check (oxfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  lint-tokens:
    name: Token convention lint (kick-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # `kick-lint` is published from packages/lint and its bin shim
      # imports `dist/index.mjs`. Build the lint package itself before
      # invoking — full `pnpm build` would be wasteful here.
      - run: pnpm --filter @forinda/kickjs-lint build
      - run: pnpm lint:tokens

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Per-package `tsc --noEmit` resolves cross-package types via
      # `package.json:exports → dist/index.d.mts`. Build the workspace
      # first so those declaration files exist on disk.
      - run: pnpm build
      - run: pnpm typecheck

  test:
    name: Test (Node 24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      # Tests resolve workspace deps via package.json `exports` which
      # points at `dist/`. Build before running so cross-package
      # imports (e.g. @forinda/kickjs-devtools-kit referenced by
      # @forinda/kickjs-queue) resolve to real artefacts. The dedicated
      # `build` job above still runs in parallel — wall time is
      # max(build, test) which is what the parallelisation buys us.
      - run: pnpm build
      - run: pnpm test

  build:
    name: Build (Node 24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Cache the built dist/ trees so the smoke-test jobs below can
      # reuse them without rebuilding from scratch.
      - uses: actions/upload-artifact@v7
        with:
          name: built-packages
          path: packages/*/dist
          retention-days: 1
          if-no-files-found: error

  bun-smoke-test:
    name: Bun smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages
      - name: Smoke test — imports resolve under Bun
        run: |
          bun -e "
            import { Container, Service, Controller } from './packages/kickjs/dist/index.mjs'
            import { Application, RequestContext, buildRoutes } from './packages/kickjs/dist/index.mjs'
            console.log('Container:', typeof Container)
            console.log('Application:', typeof Application)
            console.log('Bun smoke test passed')
          "
      - name: Smoke test — bun test on core exports
        run: |
          bun -e "
            import { Container, Scope, Service, Controller, Get, Inject } from './packages/kickjs/dist/index.mjs'
            import { RequestContext, buildRoutes, bootstrap } from './packages/kickjs/dist/index.mjs'
            const checks = { Container, Scope, Service, Controller, Get, Inject, RequestContext, buildRoutes, bootstrap }
            for (const [name, val] of Object.entries(checks)) {
              if (!val) { console.error('Missing export:', name); process.exit(1) }
            }
            console.log('All', Object.keys(checks).length, 'exports verified')
            console.log('Bun export test passed')
          "

  deno-smoke-test:
    name: Deno smoke test
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages
      - name: Smoke test — pure ESM imports resolve under Deno
        run: |
          cat > deno-smoke.mjs << 'EOF'
          import { Scope, Container, parseQuery } from "./packages/kickjs/dist/index.mjs"
          console.log("Scope:", typeof Scope)
          console.log("Container:", typeof Container)
          console.log("parseQuery:", typeof parseQuery)
          console.log("Deno smoke test passed")
          EOF
          deno run --allow-read=. --allow-env --allow-sys deno-smoke.mjs
          rm deno-smoke.mjs

  bundle-size:
    name: Bundle size assertion (devtools strip)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages
      - name: Run bundle-size assertion
        run: pnpm test:bundle-size
