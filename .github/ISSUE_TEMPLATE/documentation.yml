name: Documentation
description: Report a docs issue or suggest an improvement
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve the KickJS documentation.

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - "Incorrect / outdated content"
        - "Missing documentation"
        - "Typo / grammar"
        - "Broken link"
        - "Improvement suggestion"
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Page URL or Path
      description: Which page is affected?
      placeholder: "https://forinda.github.io/kick-js/guide/getting-started or docs/guide/getting-started.md"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue or improvement.
    validations:
      required: true
