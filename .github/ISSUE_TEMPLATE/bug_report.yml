name: Bug Report
description: Report a bug in KickJS
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: KickJS Version
      description: Which version of KickJS are you using?
      placeholder: "0.3.2"
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      description: Which package is affected?
      multiple: true
      options:
        - "@forinda/kickjs-cli"
        - "@forinda/kickjs-swagger"
        - "@forinda/kickjs-testing"
        - "@forinda/kickjs-prisma"
        - "Other / Not sure"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or code to reproduce the issue.
      placeholder: |
        1. Create a controller with `@Controller('/test')`
        2. Add `@Get('/')` handler
        3. Start the server with `kick dev`
        4. Send a GET request to `/test`
        5. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or stack traces.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your runtime environment.
      value: |
        - Node.js version:
        - OS:
        - Package manager:
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs.
    validations:
      required: false
