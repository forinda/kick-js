# Lefthook git hooks (https://github.com/evilmartians/lefthook).
#
# Pre-commit is a fast gate, not a CI replica. Heavy verification —
# `pnpm build`, the full test suite, the Node 20/22/24 matrix, the
# Bun + Deno smoke tests — runs in `.github/workflows/ci.yml` on
# every push and pull request, where the jobs already run in parallel
# matrix. Re-running them per-commit blocks the developer for 1–2
# minutes for no marginal safety: a bad commit is still caught in CI
# before merge, and `git push --force` is the recovery for a flaw
# discovered after the fact.
#
# Commands below run in parallel. Each `glob:` filters the command to
# the files actually staged in this commit, so a commit that touches
# only Markdown skips the token-lint pass entirely.

pre-commit:
  parallel: true
  commands:
    # Format check via oxfmt (Rust, ~30× faster than prettier). The
    # `glob:` filter scopes the run to staged source + markdown
    # (VitePress docs, README, articles), mirroring the
    # `format:check` script.
    format:
      glob: '{packages/*/src/**/*.{ts,tsx,js,mjs,cjs},packages/*/__tests__/**/*.{ts,tsx},packages/*/spa/src/**/*.{ts,tsx},docs/**/*.md,docs/.vitepress/**/*.{ts,mts,vue},tutorials/**/*.md,scripts/*.{ts,js,mjs},*.md}'
      run: pnpm exec oxfmt --check {staged_files}
    # ESLint-replacement linter via oxlint (Rust, sub-second on full
    # repo). Runs only when a TS file under packages/ is staged so
    # markdown-only or example-only commits skip lint.
    lint:
      glob: '{packages/*/src/**/*.{ts,tsx},packages/*/__tests__/**/*.{ts,tsx},packages/*/spa/src/**/*.{ts,tsx},scripts/*.ts,docs/.vitepress/**/*.{ts,mts}}'
      run: pnpm exec oxlint {staged_files}
    # Token-convention lint (kick-lint). Runs only when a TS file
    # under packages/ is staged — adopters editing docs / examples
    # don't pay this cost.
    lint-tokens:
      glob: 'packages/**/*.ts'
      run: pnpm lint:tokens
